# Sample config for ringer.py.
# Copy to ~/.config/ringer/config.toml or pass with --config /path/to/config.toml.

# Default identity stamped into state JSON and eval rows. Resolution order:
# --identity flag > FLEET_IDENTITY / RINGER_IDENTITY env > a .fleet-agent file
# found walking up from the working directory (per-repo agent name) > this
# value > short hostname.
# identity_default = "codex-mini"

# State files live under <state_dir>/runs/<run_id>.json.
state_dir = "~/.ringer"

# First localhost port tried for the per-run dashboard. The server will scan the
# next 49 ports if this one is busy.
dashboard_port_base = 8787

# Optional native HUD app path. Public installs should omit this and let the
# dashboard open in the browser.
# hud_app_path = "/Applications/Ringside.app"

# Belt-and-suspenders full-access gate. A task with "full_access": true will
# still fail unless this is true.
allow_full_access = false

[eval]
# Safe public default: write one JSON object per attempt to a local JSONL file.
# Use "postgres" only when [eval.postgres] is configured.
backend = "jsonl"
jsonl_path = "~/.ringer/runs.jsonl"

# Optional Supabase/Postgres logging. The env file should define:
# SUPABASE_DB_HOST, SUPABASE_DB_PORT, SUPABASE_DB_USER,
# SUPABASE_DB_PASSWORD, SUPABASE_DB_NAME.
# [eval.postgres]
# env_file = "~/.supabase.env"

[engines.codex]
# Public default resolves this with shutil.which("codex"). Set an absolute path
# here only for machine-specific installs.
bin = "codex"

# Placeholders:
# - {taskdir}: task working directory
# - {spec}: task prompt/spec
# - {access_args}: expands to sandbox_args or full_access_args
# - {engine_args}: expands to the task's optional "engine_args" list — the orchestrator
#   sets per-task flags here, e.g. ["-c", "model_reasoning_effort=medium"] to match
#   reasoning depth to task difficulty instead of inheriting the CLI-wide default
args_template = [
  "exec",
  "--skip-git-repo-check",
  "{access_args}",
  "{engine_args}",
  "-C",
  "{taskdir}",
  "{spec}",
]

# Never rely on an engine's default sandbox. Be explicit.
sandbox_args = ["--sandbox", "workspace-write"]
full_access_args = ["--dangerously-bypass-approvals-and-sandbox"]

# First capture group should be the integer token count.
token_regex = "tokens\\s+used\\s*:?\\s*([0-9][0-9,]*)"

# Grok Build CLI (xAI). Install: curl -fsSL https://x.ai/cli/install.sh | bash
# (or: npm install -g @xai-official/grok), then `grok login` — OAuth on a
# SuperGrok or X Premium Plus plan. Headless mode (-p) runs a full agentic
# loop with tools and exits. Grok brings its own OS sandbox (Seatbelt on
# macOS): profile "workspace" = read everywhere, write CWD + temp + ~/.grok,
# network allowed. Models: grok-build, grok-composer-2.5-fast (route with the
# per-task "model" field). Verified against Grok Build v0.2.81 (2026-07-06).
# Note: --no-auto-update is accepted but absent from --help in v0.2.81 (grok
# rejects unknown flags, so this is a hidden flag, not a typo) — it stops the
# CLI self-updating mid-swarm.
# Uncomment to enable.
# [engines.grok]
# bin = "grok"
# model_default = "grok-composer-2.5-fast"
# args_template = [
#   "--cwd",
#   "{taskdir}",
#   "{access_args}",
#   "-m",
#   "{model}",
#   "--always-approve",
#   "--no-auto-update",
#   "--output-format",
#   "json",
#   "{engine_args}",
#   "-p",
#   "{spec}",
# ]
# sandbox_args = ["--sandbox", "workspace"]
# full_access_args = ["--sandbox", "off", "--permission-mode", "bypassPermissions"]
# Grok's JSON output carries no usage/token fields (verified v0.2.81) — plan
# CLIs report cost as "included in plan"; regex is a harmless no-match.
# token_regex = "\"total_tokens\"\\s*:\\s*([0-9]+)"

# For CI, acceptance evals, and trying Ringer without an API bill.
# [engines.mock]
# bin = "python3"
# args_template = [
#   "/absolute/path/to/ringer/engines/mock_worker.py",
#   "{spec}",
# ]
# sandbox_args = []
# full_access_args = []

# OpenCode + OpenRouter — the universal model harness. One engine block runs
# ANY OpenRouter-served model: the {model} placeholder is filled per task from
# the manifest's "model" field, falling back to model_default below. Example
# default: GLM-5.2 (z-ai/glm-5.2, roughly $0.74/M input, $2.33/M output as of
# 2026-07) — the cheap-intelligence lane.
# OpenCode has no OS sandbox, so `bin` points at engines/opencode-sandboxed.sh
# (macOS Seatbelt: network + reads open, writes confined to the task dir, a
# per-run scratch dir, and OpenCode's state/config dirs). Auth: put your
# OpenRouter key where your OpenCode version expects it — commonly
# ~/.local/share/opencode/auth.json ({"openrouter": {"type": "api", "key": "..."}});
# confirm the path with your installed CLI.
# Per-task engine_args can set reasoning effort ("--variant", "low|high|max").
# Uncomment and set an absolute path for `bin` to enable.
# [engines.opencode]
# bin = "/absolute/path/to/ringer/engines/opencode-sandboxed.sh"
# model_default = "openrouter/z-ai/glm-5.2"
# args_template = [
#   "{taskdir}",
#   "{access_args}",
#   "run",
#   "-m",
#   "{model}",
#   "--dangerously-skip-permissions",
#   "--format",
#   "json",
#   "{engine_args}",
#   "--dir",
#   "{taskdir}",
#   "{spec}",
# ]
# sandbox_args = []
# full_access_args = ["--no-sandbox"]
# token_regex = '"tokens":\{"total":([0-9]+)'

# Gemini CLI, direct to Google AI Studio (no OpenRouter). Install:
# `brew install gemini-cli` or `npm i -g @google/gemini-cli`, then authenticate
# (OAuth via `gemini` then /auth, or a GEMINI_API_KEY in the environment).
# Gemini ships no verified OS sandbox for this use, so `bin` points at
# engines/gemini-sandboxed.sh (macOS Seatbelt: network + reads open minus a
# credential deny-list, writes confined to the task dir, scratch, and ~/.gemini).
# --skip-trust is MANDATORY: Gemini 0.46 downgrades yolo approval to "default" in
# an untrusted folder, and ringer task dirs are fresh temp dirs never trusted.
# Uncomment and set an absolute path for `bin` to enable.
# [engines.gemini]
# bin = "/absolute/path/to/ringer/engines/gemini-sandboxed.sh"
# model_default = "gemini-2.5-flash"
# args_template = [
#   "{taskdir}",
#   "{access_args}",
#   "-m",
#   "{model}",
#   "--approval-mode",
#   "yolo",
#   "--skip-trust",
#   "-o",
#   "json",
#   "{engine_args}",
#   "-p",
#   "{spec}",
# ]
# sandbox_args = []
# full_access_args = ["--no-sandbox"]

# Claude Code as a worker lane. NOT a cheap lane: a headless Claude worker loads
# the operator's global CLAUDE.md, hooks, and skills, so a trivial verified task
# can run 100k+ input tokens. Route here only for tasks a cheaper lane has failed.
# Claude ships no OS sandbox, so `bin` points at engines/claude-sandboxed.sh
# (macOS Seatbelt). Claude stores its OAuth token in the macOS login Keychain, so
# that wrapper keeps ~/.claude and ~/Library/Keychains readable and denies every
# other credential store; see the header of claude-sandboxed.sh for the trade-off.
# Uncomment and set an absolute path for `bin` to enable.
# [engines.claude]
# bin = "/absolute/path/to/ringer/engines/claude-sandboxed.sh"
# model_default = "sonnet"
# args_template = [
#   "{taskdir}",
#   "{access_args}",
#   "-p",
#   "{spec}",
#   "--model",
#   "{model}",
#   "--permission-mode",
#   "bypassPermissions",
#   "--output-format",
#   "json",
#   "--strict-mcp-config",
#   "{engine_args}",
# ]
# sandbox_args = []
# full_access_args = ["--no-sandbox"]
# Claude's JSON usage block has no total; this captures OUTPUT tokens only.
# token_regex = '"output_tokens":\s*([0-9]+)'

[artifact]
# Zero-LLM, self-contained HTML artifacts rendered directly from state — no model calls, no
# network. Three files per config, all pure stdlib templates:
#   - `out`: the live status page, re-rendered on every ~1s state flush while a run is in
#     progress (meta-refresh, no JS needed). Ringside can embed or open this.
#   - `report_out`: the final report, rendered once when a run finishes — full task table,
#     timings, attempts/retries, check output, links to each task's worker.log/report files.
#   - `index_out`: a single multi-run index listing every run under state_dir (handy when
#     several swarms run at once).
# Templates support {run_id} and {run_name} substitution. Disable with --no-artifact.
enabled = true
out = "~/.ringer/artifacts/{run_id}.html"
report_out = "~/.ringer/artifacts/{run_id}-report.html"
index_out = "~/.ringer/artifacts/index.html"
