[model]
key = "gpt-5.6-sol"
display = "GPT-5.6 Sol"
vendor = "OpenAI"
release_date = "2026-07-09"
identity_verification = "OpenAI's developer model page for gpt-5.6-sol lists it as the flagship member of the GPT-5.6 family (Sol/Terra/Luna) with a 1,050,000 context window, 128,000 max output tokens, reasoning token support, and a Feb 16, 2026 knowledge cutoff. GA of the GPT-5.6 family is widely reported as 2026-07-09 (third-party); the model page carries the Feb 16 2026 knowledge cutoff but no in-page GA date."

[api]
endpoint_families = ["responses", "chat-completions", "batch"]
auth = "In this setup, Codex CLI signs in with ChatGPT/OAuth plan credentials and uses ChatGPT workspace permissions, plan access, and ChatGPT-managed Codex entitlements. Codex CLI can also sign in with an OpenAI API key; API-key usage is billed through the OpenAI Platform account at standard API rates instead of included ChatGPT plan credits."
streaming = "Supported. API streaming is available with stream=true on Responses and Chat Completions; streaming responses use server-sent events. The Sol model page also lists Realtime, Assistants, Fine-tuning, Embeddings, and image/audio endpoints among the broadest endpoint set in the family; Ringer uses Responses/Chat via Codex."

[caching]
supported = true
mode = "implicit"
how_enabled = "Prompt caching works automatically for eligible requests with no code changes. GPT-5.6 introduces more predictable prompt caching, including support for explicit cache breakpoints. Caching starts at 1024 prompt tokens; repeated prompt prefixes, tools, and structured-output schemas can contribute to the cached prefix."
ttl = "GPT-5.6 introduces a 30-minute minimum cache life (per the openai.com GPT-5.6 overview), a change from the GPT-5.5 24h prompt_cache_retention model. Explicit cache breakpoints let callers mark segments to cache and reuse."
read_pricing_per_m = 0.50
write_pricing_per_m = 6.25
min_cacheable_prefix_tokens = 1024

[tool_calling]
format = "OpenAI Responses API tools and function calls with JSON Schema tool parameters. Chat Completions function calling is also supported. Structured Outputs are supported, including strict JSON Schema mode with strict=true. Family-level GPT-5.6 behavior inherited from the OpenAI platform; not separately re-verified on the per-tier model page."
parallel = true
strict_json_schema = true
quirks = [
  "For reasoning models using function calling through the Responses API, pass back reasoning items, function call items, and function call output items during tool loops.",
  "Prompt-only JSON mode can still produce incomplete JSON when output is cut off by max_output_tokens or a content filter; use Structured Outputs for schema adherence.",
]

[reasoning]
params = ["reasoning.effort", "text.verbosity", "max_output_tokens", "model_reasoning_effort", "model_reasoning_summary", "model_verbosity"]
defaults = "The gpt-5.6-sol model page confirms reasoning token support but does not enumerate the effort scale. Sol is the deepest-reasoning tier and the only one observed to expose `model_reasoning_effort=max` (and a codex `ultra` multi-agent mode). Harness-observed through the Codex CLI config surface, NOT OpenAI public model docs. Route Sol per-task for gnarly, long-horizon, or long-context work; treat the per-tier effort ceiling as such."
max_output_interaction = "max_output_tokens limits total generated tokens, including reasoning tokens, visible output tokens, and non-visible formatting tokens. If the cap is exhausted during reasoning, the response can be incomplete before any visible output is produced. Sol's deeper reasoning consumes proportionally more of the output budget as reasoning tokens."

[limits]
context_window = 1050000
max_output_tokens = 128000
rate_limits = "Prompts with >272K input tokens are priced at 2x input and 1.5x output for the full request (per the gpt-5.6-sol model page). Knowledge cutoff Feb 16, 2026. ChatGPT-plan Codex OAuth usage is governed by plan entitlements, not API billing tiers; per-tier long-context API rate-limit tiers are not published on the model page."

[openrouter]
upstream_providers = ["openai"]
require_parameters_behavior = "This registry entry is for OpenAI direct/Codex OAuth access. If served via OpenRouter, the model slug would pass through the opencode engine's model field."

[pricing]
prompt_per_m = 5.00
completion_per_m = 30.00
cache_read_per_m = 0.50
cache_write_per_m = 6.25
as_of = "2026-07-14"

